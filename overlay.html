<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>natanjogos - Media Share Overlay</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html,
  body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    font-family: "Segoe UI", Arial, sans-serif;
  }

  body {
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: 20px;
  }

  #overlay-root {
    width: min(720px, calc(100vw - 40px));
    display: none;
    pointer-events: none;
    filter: drop-shadow(0 18px 36px rgba(0, 0, 0, 0.45));
  }

  #overlay-root.visible {
    display: block;
    animation: overlay-in 0.35s ease-out;
  }

  @keyframes overlay-in {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #video-shell {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #000;
    border: 2px solid rgba(124, 58, 237, 0.75);
    border-radius: 12px 12px 0 0;
    position: relative;
  }

  #video-player {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  #yt-fallback {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
  }

  #banner {
    position: relative;
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 72px;
    padding: 12px 18px 15px;
    color: #f0eeff;
    background: rgba(10, 10, 20, 0.9);
    border: 2px solid rgba(124, 58, 237, 0.75);
    border-top: 0;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }

  .play-mark {
    width: 42px;
    height: 42px;
    display: grid;
    place-items: center;
    flex: 0 0 auto;
    border-radius: 10px;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
  }

  .play-mark::before {
    content: "";
    width: 0;
    height: 0;
    margin-left: 3px;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    border-left: 14px solid #fff;
  }

  .info {
    min-width: 0;
    flex: 1;
  }

  .label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.4px;
    color: #a78bfa;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .title {
    max-width: 100%;
    overflow: hidden;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  .user {
    max-width: 100%;
    overflow: hidden;
    color: rgba(240, 238, 255, 0.62);
    font-size: 12px;
    white-space: nowrap;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .timer {
    flex: 0 0 auto;
    color: #c4b5fd;
    font-size: 18px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }

  .progress-wrap {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 4px;
    background: rgba(124, 58, 237, 0.22);
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7c3aed, #a855f7);
  }
</style>
</head>
<body>
  <div id="overlay-root">
    <div id="video-shell">
      <video id="video-player" autoplay playsinline></video>
      <iframe id="yt-fallback" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div id="banner">
      <div class="play-mark" aria-hidden="true"></div>
      <div class="info">
        <div class="label">Tocando agora</div>
        <div class="title" id="now-title">Aguardando video</div>
        <div class="user" id="now-user">pedido por alguem</div>
      </div>
      <div class="timer" id="timer">0:00</div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
  </div>

<script>
const firebaseConfig = {
  apiKey:            "AIzaSyCJTxuj9BIDaKjuOpncPR324XukHo1pBAM",
  authDomain:        "mediashare-d352f.firebaseapp.com",
  databaseURL:       "https://mediashare-d352f-default-rtdb.firebaseio.com",
  projectId:         "mediashare-d352f",
  storageBucket:     "mediashare-d352f.firebasestorage.app",
  messagingSenderId: "25476047009",
  appId:             "1:25476047009:web:ae529f5d66486a398850e0"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const database = firebase.database();
const queueRef = database.ref("ms/queue");
const currentRef = database.ref("ms/current");
const settingsRef = database.ref("ms/settings");

const video = document.getElementById("video-player");
const ytFallback = document.getElementById("yt-fallback");

let queue = [];
let current = null;
let maxDuration = 300;
let volume = 60;
let activeVideoKey = "";
let limitTimer = null;
let clockTimer = null;
let finishing = false;
let usingFallback = false;

// --- YouTube IFrame Player API (detecta ads no overlay) ---
let ytPlayer = null;
let ytReady = false;
let ytExpectedVideoId = '';
let ytAdPlaying = false;
let ytAdCheckInterval = null;
let timerPausedForAd = false;

const ytApiTag = document.createElement('script');
ytApiTag.src = 'https://www.youtube.com/iframe_api';
document.head.appendChild(ytApiTag);

window.onYouTubeIframeAPIReady = function() { ytReady = true; };

auth.signInAnonymously()
  .catch(error => console.error("Firebase anonymous auth failed", error))
  .finally(attachFirebaseListeners);

async function loadVideo(videoId, startSeconds) {
  ytExpectedVideoId = videoId;
  ytAdPlaying = false;
  timerPausedForAd = false;
  clearInterval(ytAdCheckInterval);

  video.style.display = "none";
  ytFallback.style.display = "none";
  usingFallback = true;

  if (ytReady) {
    // Usa container para o YT Player API
    const shell = document.getElementById("video-shell");
    let playerDiv = document.getElementById("yt-overlay-player");
    if (!playerDiv) {
      playerDiv = document.createElement("div");
      playerDiv.id = "yt-overlay-player";
      playerDiv.style.cssText = "position:absolute;inset:0;width:100%;height:100%;";
      shell.appendChild(playerDiv);
    }
    playerDiv.style.display = "block";

    if (ytPlayer) { try { ytPlayer.destroy(); } catch(e){} }

    ytPlayer = new YT.Player("yt-overlay-player", {
      videoId: videoId,
      width: "100%",
      height: "100%",
      playerVars: {
        autoplay: 1,
        start: Math.floor(startSeconds || 0),
        rel: 0,
        modestbranding: 1,
        iv_load_policy: 3,
        enablejsapi: 1,
        origin: window.location.origin
      },
      events: {
        onReady: function(e) {
          e.target.setVolume(volume);
          startAdDetection();
        },
        onStateChange: function(e) {
          if (e.data === YT.PlayerState.ENDED && !finishing) finishCurrent();
        }
      }
    });
  } else {
    // Fallback: iframe simples
    ytFallback.style.display = "block";
    ytFallback.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&start=${Math.floor(startSeconds || 0)}&rel=0&modestbranding=1&iv_load_policy=3`;
  }
}

function startAdDetection() {
  clearInterval(ytAdCheckInterval);
  ytAdCheckInterval = setInterval(() => {
    if (!ytPlayer || typeof ytPlayer.getVideoData !== 'function') return;
    try {
      const data = ytPlayer.getVideoData();
      const currentId = data?.video_id || '';
      const isAd = currentId !== '' && currentId !== ytExpectedVideoId;

      if (isAd && !ytAdPlaying) {
        ytAdPlaying = true;
        ytPlayer.mute();
        timerPausedForAd = true;
      } else if (!isAd && ytAdPlaying) {
        ytAdPlaying = false;
        ytPlayer.unMute();
        ytPlayer.setVolume(volume);
        timerPausedForAd = false;
      }
    } catch(e) {}
  }, 500);
}

// --- Firebase listeners ---
function attachFirebaseListeners() {
  queueRef.on("value", snap => {
    const raw = snap.val() || {};
    queue = Object.entries(raw)
      .map(([key, value]) => ({ key, ...value }))
      .sort((a, b) => Number(a.submittedAt || 0) - Number(b.submittedAt || 0));
    maybeStartQueue();
  }, error => console.error("Queue listener failed", error));

  currentRef.on("value", snap => {
    current = snap.val() || null;
    syncPlayback();
    maybeStartQueue();
  }, error => console.error("Current listener failed", error));

  settingsRef.on("value", snap => {
    const settings = snap.val() || {};
    maxDuration = Number(settings.maxDuration || 120);
    if (settings.volume !== undefined) {
      volume = Number(settings.volume);
      if (!usingFallback) video.volume = volume / 100;
    }
    syncClock();
  }, error => console.error("Settings listener failed", error));
}

function withPlaybackData(item) {
  return {
    ...item,
    startedAt: Date.now(),
    duration: Number(maxDuration || 120)
  };
}

function maybeStartQueue() {
  if (current || !queue.length || finishing) return;
  currentRef.transaction(existing => {
    if (existing || !queue.length) return existing;
    return withPlaybackData(queue[0]);
  });
}

function syncPlayback() {
  clearTimeout(limitTimer);

  if (!current || !current.videoId) {
    hideOverlay();
    activeVideoKey = "";
    return;
  }

  showOverlay(current);
  syncClock();

  const duration = getDuration();
  const elapsed = getElapsed();
  const remaining = Math.max(0, duration - elapsed);

  if (remaining <= 0) {
    finishCurrent();
    return;
  }

  limitTimer = setTimeout(finishCurrent, (remaining + 0.5) * 1000);

  const videoKey = `${current.id || ""}:${current.videoId}`;
  if (videoKey !== activeVideoKey) {
    activeVideoKey = videoKey;
    loadVideo(current.videoId, Math.max(0, elapsed));
  }
}

function showOverlay(item) {
  document.getElementById("overlay-root").classList.add("visible");
  document.getElementById("now-title").textContent =
    item.title || `youtu.be/${item.videoId}`;
  document.getElementById("now-user").textContent =
    `pedido por ${item.submitter || item.user || "alguem"}`;
}

function hideOverlay() {
  document.getElementById("overlay-root").classList.remove("visible");
  clearTimeout(limitTimer);
  clearInterval(clockTimer);
  clearInterval(ytAdCheckInterval);
  video.pause();
  video.removeAttribute("src");
  ytFallback.src = "";
  if (ytPlayer) { try { ytPlayer.destroy(); } catch(e){} ytPlayer = null; }
  const pd = document.getElementById("yt-overlay-player");
  if (pd) pd.style.display = "none";
  document.getElementById("progress-bar").style.width = "0%";
}

function syncClock() {
  clearInterval(clockTimer);
  updateClock();
  if (current) {
    clockTimer = setInterval(updateClock, 1000);
  }
}

function updateClock() {
  if (timerPausedForAd) return; // Nao conta tempo durante ad
  const duration = getDuration();
  const elapsed = Math.min(duration, getElapsed());
  const remaining = Math.max(0, duration - elapsed);
  const progress = duration > 0 ? (elapsed / duration) * 100 : 0;

  document.getElementById("timer").textContent = formatTime(remaining);
  document.getElementById("progress-bar").style.width = `${Math.min(100, progress)}%`;
  if (remaining <= 0 && !finishing) finishCurrent();
}

function getDuration() {
  return Number(current?.duration || maxDuration || 120);
}

function getElapsed() {
  if (!current?.startedAt) return 0;
  return Math.max(0, Math.floor((Date.now() - Number(current.startedAt)) / 1000));
}

function formatTime(seconds) {
  const value = Math.max(0, Math.round(Number(seconds || 0)));
  return `${Math.floor(value / 60)}:${String(value % 60).padStart(2, "0")}`;
}

async function finishCurrent() {
  if (finishing || !current) return;
  finishing = true;

  const done = current;
  const next = queue.find(item => item.id !== done.id);

  try {
    await removeQueuedById(done.id);
    if (next) {
      await currentRef.set(withPlaybackData(next));
    } else {
      await currentRef.remove();
    }
  } finally {
    finishing = false;
  }
}

async function removeQueuedById(id) {
  if (!id) return;
  const snap = await queueRef.orderByChild("id").equalTo(id).once("value");
  const removals = [];
  snap.forEach(child => removals.push(child.ref.remove()));
  await Promise.all(removals);
}
</script>
</body>
</html>
